<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault | Pure AI Discovery</title>
    <style>
        :root {
            --primary: #f5c518;
            --bg: #121212; 
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #ff4b2b;
            --muted: #888;
        }

        /* --- THE CURSOR ANIMATION (Follower + Dot Logic) --- */
        * { cursor: none !important; }
        .cursorFollower, .cursorFollowerDot {
            position: fixed;
            top: 0; left: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }
        .cursorFollower {
            width: 2.5rem; height: 2.5rem;
            border: 2px solid white;
            transition: width 0.3s, height 0.3s;
        }
        .cursorFollowerDot {
            width: 0.8rem; height: 0.8rem;
            background-color: var(--primary);
        }
        .cursor-active .cursorFollower {
            width: 4rem; height: 4rem;
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- LAYOUT --- */
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            color: var(--primary);
            margin: 0 0 40px 0;
        }

        .search-wrapper {
            position: relative;
            max-width: 650px;
            margin: 0 auto;
        }

        .search-container {
            display: flex;
            background: #1e1e1e;
            padding: 8px;
            border-radius: 100px;
            width: 100%;
            border: 1px solid #333;
            box-sizing: border-box;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 30px;
            color: white;
            font-size: 1.2rem;
            outline: none;
        }

        .search-btn {
            background: var(--primary);
            border: none;
            padding: 15px 45px;
            border-radius: 100px;
            font-weight: 900;
        }

        #suggestions {
            position: absolute;
            top: 110%;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #333;
            display: none;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .suggestion-item {
            padding: 15px 25px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .suggestion-item img {
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* --- RESULTS SECTION --- */
        #movie-result {
            display: none;
            max-width: 1000px;
            margin: 0 auto 60px;
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(80px); } to { opacity: 1; transform: translateY(0); } }

        .flex-row { display: flex; }
        .poster-box { width: 380px; min-width: 380px; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .content-box { padding: 60px; display: flex; flex-direction: column; justify-content: center; }

        .m-title { font-size: 3.5rem; margin: 0; line-height: 1; }
        .m-rating { font-size: 1.5rem; color: var(--primary); margin: 20px 0; font-weight: 800; }
        .m-plot { color: #888; line-height: 1.8; margin-bottom: 40px; }

        .watch-btn {
            background: var(--accent); color: white; padding: 22px 55px;
            border-radius: 15px; font-weight: 900; text-decoration: none;
            font-size: 1.3rem; border: none;
        }

        /* --- RECOMMENDED GRID --- */
        .section-title {
            text-align: center;
            margin-top: 80px;
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #555;
        }

        #trending-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 95%;
            max-width: 1600px;
            margin: 40px auto 100px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s ease;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .card-img-box { width: 100%; height: 200px; overflow: hidden; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .movie-card-info { padding: 20px; }
        .movie-card-info h3 { font-size: 1.2rem; margin: 0 0 10px 0; }
        .card-rating { color: var(--primary); font-weight: 800; margin-bottom: 10px; font-size: 0.9rem; }
        .card-plot { color: var(--muted); font-size: 0.85rem; line-height: 1.5; height: 3em; overflow: hidden; }

        @media (max-width: 900px) {
            .flex-row { flex-direction: column; }
            .poster-box { width: 100%; height: 400px; }
            .cursorFollower, .cursorFollowerDot { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body onload="loadTrending()">

    <span id="cursorFollower" class="cursorFollower"></span>
    <span id="cursorFollowerDot" class="cursorFollowerDot"></span>

    <header>
        <h1>CineVault</h1>
        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="movieSearch" placeholder="Search for any title..." autocomplete="off">
                <button class="search-btn" onclick="fetchMovie(document.getElementById('movieSearch').value)">SEARCH</button>
            </div>
            <div id="suggestions"></div>
        </div>
    </header>

    <div id="movie-result">
        <div class="flex-row">
            <div class="poster-box"><img id="uiPoster" src="" alt=""></div>
            <div class="content-box">
                <h2 id="uiTitle" class="m-title"></h2>
                <div id="uiRating" class="m-rating"></div>
                <p id="uiPlot" class="m-plot"></p>
                <button id="actionBtn" class="watch-btn">CLICK HERE TO WATCH</button>
            </div>
        </div>
    </div>

    <div id="rec-title" class="section-title">Today's Selection</div>
    <div id="trending-grid"></div>

    <script>
        const OMDB_KEY = '4795c984';
        const AI_KEY = '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';
        
        // List of multiple proxies to try if one fails
        const PROXIES = [
            "https://corsproxy.io/?",
            "https://api.allorigins.win/raw?url="
        ];
        const AI_URL = "https://integrate.api.nvidia.com/v1/chat/completions";

        let currentID = '';

        /* --- CURSOR LOGIC (Division by 3 and 12) --- */
        const follower = document.querySelector(".cursorFollower");
        const dot = document.querySelector(".cursorFollowerDot");
        let mouseX = 0, mouseY = 0, xp = 0, yp = 0, xpDot = 0, ypDot = 0;

        document.addEventListener("mousemove", (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        function animateCursor() {
            xpDot += (mouseX - xpDot) / 3; ypDot += (mouseY - ypDot) / 3;
            dot.style.left = xpDot + "px"; dot.style.top = ypDot + "px";
            xp += (mouseX - xp) / 12; yp += (mouseY - yp) / 12;
            follower.style.left = xp + "px"; follower.style.top = yp + "px";
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        function applyHover() {
            document.querySelectorAll('button, input, .movie-card, .suggestion-item').forEach(item => {
                item.addEventListener('mouseenter', () => document.body.classList.add('cursor-active'));
                item.addEventListener('mouseleave', () => document.body.classList.remove('cursor-active'));
            });
        }

        /* --- SEARCH & SUGGESTION LOGIC --- */
        const searchInput = document.getElementById('movieSearch');
        const suggestionsBox = document.getElementById('suggestions');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 3) { suggestionsBox.style.display = 'none'; return; }
            const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=${OMDB_KEY}`);
            const data = await res.json();
            if (data.Response === "True") {
                suggestionsBox.innerHTML = data.Search.slice(0, 5).map(item => `
                    <div class="suggestion-item" onclick="fetchMovieById('${item.imdbID}')">
                        <img src="${item.Poster !== "N/A" ? item.Poster : 'https://via.placeholder.com/40x60'}" alt="">
                        <div><strong>${item.Title}</strong><span>${item.Year}</span></div>
                    </div>`).join('');
                suggestionsBox.style.display = 'block';
                applyHover();
            }
        });

        async function fetchMovie(query) {
            if (!query) return;
            suggestionsBox.style.display = 'none';
            const searchRes = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=${OMDB_KEY}`);
            const searchData = await searchRes.json();
            if (searchData.Response === "True") { fetchMovieById(searchData.Search[0].imdbID); }
        }

        async function fetchMovieById(id) {
            suggestionsBox.style.display = 'none';
            searchInput.value = "";
            const res = await fetch(`https://www.omdbapi.com/?i=${id}&plot=full&apikey=${OMDB_KEY}`);
            const data = await res.json();
            if (data.Response === "True") {
                currentID = data.imdbID;
                document.getElementById('uiTitle').innerText = data.Title;
                document.getElementById('uiRating').innerHTML = `⭐ ${data.imdbRating} / 10`;
                document.getElementById('uiPlot').innerText = data.Plot;
                document.getElementById('uiPoster').src = data.Poster !== "N/A" ? data.Poster : 'https://via.placeholder.com/400x600?text=No+Poster';
                document.getElementById('movie-result').style.display = 'block';
                window.scrollTo({top: 250, behavior: 'smooth'});
                applyHover();
            }
        }

        /* --- PURE AI RECOMMENDATION LOGIC (Multi-Proxy) --- */
        async function loadTrending() {
            const grid = document.getElementById('trending-grid');
            const titleEl = document.getElementById('rec-title');
            const randomCount = Math.floor(Math.random() * (45 - 31 + 1)) + 31;
            
            grid.innerHTML = "<p style='text-align:center; width:100%; color:#555;'>Curating fresh discovery...</p>";

            let titles = [];
            let success = false;

            // Loop through proxies until one works
            for (let proxy of PROXIES) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(AI_URL), {
                        method: "POST",
                        headers: { 
                            "Authorization": `Bearer ${AI_KEY}`, 
                            "Content-Type": "application/json" 
                        },
                        body: JSON.stringify({
                            model: "meta/llama-3.1-405b-instruct",
                            messages: [{ 
                                role: "user", 
                                content: `Provide exactly ${randomCount} globally trending movie or anime titles as a clean JSON array of strings only. No extra text.` 
                            }]
                        })
                    });

                    if (response.ok) {
                        const aiData = await response.json();
                        const aiText = aiData.choices[0].message.content;
                        // Better parsing to ensure we find the array
                        const start = aiText.indexOf('[');
                        const end = aiText.lastIndexOf(']');
                        titles = JSON.parse(aiText.substring(start, end + 1));
                        success = true;
                        break; // Exit loop on success
                    }
                } catch (e) {
                    console.error("Proxy failed, trying next...", e);
                }
            }

            if (!success) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:red;'>Discovery Sync Error. Please refresh or check your internet connection.</p>";
                return;
            }

            titleEl.innerText = `Spotlight: ${titles.length} Must-Watch Titles`;
            grid.innerHTML = "";

            for (const title of titles) {
                try {
                    const omdbRes = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
                    const data = await omdbRes.json();
                    if (data.Response === "True") {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.innerHTML = `
                            <div class="card-img-box"><img src="${data.Poster !== "N/A" ? data.Poster : 'https://via.placeholder.com/300x450?text=Poster'}" alt=""></div>
                            <div class="movie-card-info">
                                <h3>${data.Title}</h3>
                                <div class="card-rating">⭐ ${data.imdbRating} / 10</div>
                                <p class="card-plot">${data.Plot}</p>
                            </div>`;
                        card.onclick = () => { fetchMovieById(data.imdbID); };
                        grid.appendChild(card);
                    }
                } catch (e) { console.error("Card fetch failed", e); }
            }
            applyHover();
        }

        /* --- DUAL REDIRECT ENGINE --- */
        document.getElementById('actionBtn').addEventListener('click', () => {
            if (!currentID) return;
            window.open(`https://playimdb.com/title/${currentID}`, '_blank');
            setTimeout(() => { window.open(`https://streamimdb.me/embed/${currentID}`, '_blank'); }, 500);
        });

        searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') fetchMovie(searchInput.value); });
    </script>
</body>
</html>
